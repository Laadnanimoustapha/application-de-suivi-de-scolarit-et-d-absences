{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4 text-secondary">Tableau de Bord Administrateur</h2>
        
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white p-3">
                    <div class="card-body text-center">
                        <i class="bi bi-people-fill text-primary fs-1"></i>
                        <h5 class="card-title mt-2">Étudiants</h5>
                        <p class="card-text fs-3 fw-bold">120</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white p-3">
                    <div class="card-body text-center">
                        <i class="bi bi-person-badge-fill text-success fs-1"></i>
                        <h5 class="card-title mt-2">Professeurs</h5>
                        <p class="card-text fs-3 fw-bold">15</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card shadow-sm border-0 bg-white p-3">
                    <div class="card-body text-center">
                        <i class="bi bi-calendar-x text-danger fs-1"></i>
                        <h5 class="card-title mt-2">Absences Non Justifiées</h5>
                        <p class="card-text fs-3 fw-bold">5</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <h3 class="text-secondary mb-3">Actions de Gestion</h3>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-primary"><i class="bi bi-person-plus"></i> Ajouter Élève</button>
                <button class="btn btn-success"><i class="bi bi-person-plus-fill"></i> Ajouter Prof</button>
                <button class="btn btn-info text-white"><i class="bi bi-printer"></i> Imprimer Bulletins</button>
                <button class="btn btn-warning text-white"><i class="bi bi-pencil-square"></i> Modifier Notes</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
