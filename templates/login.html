{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-header bg-white text-center py-4">
                <h4 class="text-primary fw-bold">Identification</h4>
                <p class="text-muted small">Sélectionnez votre profil pour continuer</p>
            </div>
            <div class="card-body p-4">
                
                <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="etudiant-tab" data-bs-toggle="pill" data-bs-target="#etudiant" type="button">Élève</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="prof-tab" data-bs-toggle="pill" data-bs-target="#prof" type="button">Prof</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="admin-tab" data-bs-toggle="pill" data-bs-target="#admin" type="button">Admin</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="etudiant">
                        <form action="/login/etudiant" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Email Étudiant</label>
                                <input type="email" class="form-control" name="email" required placeholder="nom@ecole.ma">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Se connecter</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="prof">
                        <form action="/login/professeur" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Email Professeur</label>
                                <input type="email" class="form-control" name="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Accès Enseignant</button>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="admin">
                        <form action="/login/admin" method="POST">
                            <div class="mb-3">
                                <label class="form-label">Nom d'utilisateur Admin</label>
                                <input type="text" class="form-control" name="username" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mot de passe</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Connexion Admin</button>
                        </form>
                    </div>
                </div>

                <div id="error-message" class="alert alert-danger mt-3 d-none"></div>

            </div>
        </div>
    </div>
</div>


{% endblock %}
